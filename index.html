<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca avançada</title>

<link rel="icon" href="data:,">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:360px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:260px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔍
<input id="searchInput"
placeholder="Buscar endereço, rua, cidade ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

////////////////////////////////////////////////////
//////////////////// MAPA //////////////////////////
////////////////////////////////////////////////////

var map = L.map('map').setView([-15,-55],4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


////////////////////////////////////////////////////
//////////////// LOCALIZAÇÃO ///////////////////////
////////////////////////////////////////////////////

map.locate({setView:true,maxZoom:16});

map.on("locationfound",function(e){

L.marker(e.latlng)
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});


////////////////////////////////////////////////////
//////////////////// BUSCA /////////////////////////
////////////////////////////////////////////////////

const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");


//////////////////// DEBOUNCE //////////////////////

function debounce(func, delay){

let timer;

return function(...args){

clearTimeout(timer);

timer = setTimeout(()=>{
func.apply(this,args)
},delay);

}

}

input.addEventListener("input",debounce(searchPlaces,250));


//////////////// BUSCAR LOCAIS /////////////////////

async function searchPlaces(){

let query = input.value.trim();

if(query.length < 2){

suggestions.style.display="none";
return;

}

try{

let url =
`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=6&lang=pt`;

let res = await fetch(url);

let data = await res.json();

showSuggestions(data.features);

}catch(err){

console.error("Erro na busca:",err);

}

}


/////////////// MOSTRAR SUGESTÕES //////////////////

function showSuggestions(results){

suggestions.innerHTML="";

if(!results || results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach(place=>{

let props = place.properties;

let label =
props.name ||
props.street ||
props.city ||
props.state ||
"Local";

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick=function(){

selectPlace(place);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


//////////////// SELECIONAR LOCAL //////////////////

async function selectPlace(place){

let lat = place.geometry.coordinates[1];
let lon = place.geometry.coordinates[0];

try{

let url =
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=pt-BR`;

let res = await fetch(url);

let data = await res.json();

let label = data.display_name;

map.setView([lat,lon],17);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;

suggestions.style.display="none";

}catch(err){

console.error("Erro ao buscar detalhes:",err);

}

}


////////// ESCONDER SUGESTÕES AO CLICAR FORA ///////

document.addEventListener("click",function(e){

if(!document.getElementById("searchContainer").contains(e.target)){

suggestions.style.display="none";

}

});


////////////////////////////////////////////////////
//////////// IGREJAS CATÓLICAS /////////////////////
////////////////////////////////////////////////////


var churchesLayer = L.layerGroup().addTo(map);


var churchIcon = L.icon({

iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448339.png",
iconSize:[32,32],
iconAnchor:[16,32],
popupAnchor:[0,-30]

});


async function loadCatholicChurches(){

churchesLayer.clearLayers();

var bounds = map.getBounds();

var south = bounds.getSouth();
var west = bounds.getWest();
var north = bounds.getNorth();
var east = bounds.getEast();

var query = `
[out:json][timeout:25];
(
node["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
way["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
);
out center;
`;

try{

var res = await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
});

var data = await res.json();

data.elements.forEach(el=>{

var lat = el.lat || el.center.lat;
var lon = el.lon || el.center.lon;

var name = el.tags?.name || "Igreja Católica";

L.marker([lat,lon],{icon:churchIcon})
.addTo(churchesLayer)
.bindPopup(name);

});

}catch(err){

console.error("Erro Overpass:",err);

}

}


map.whenReady(loadCatholicChurches);

map.on("moveend",loadCatholicChurches);


});

</script>

</body>
</html>
