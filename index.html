<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca</title>

<link rel="icon" href="data:,">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body{
height:100%;
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
height:100%;
width:100%;
}

/* container busca */

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:340px;
}

/* caixa busca */

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:8px 14px;
}

/* lupa */

#searchIcon{
font-size:18px;
margin-right:8px;
color:#666;
}

/* input */

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
background:none;
}

/* sugestões */

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:240px;
overflow-y:auto;
display:none;
}

/* item sugestão */

.suggestion{
padding:10px 14px;
cursor:pointer;
font-size:14px;
border-bottom:1px solid #eee;
}

.suggestion:last-child{
border-bottom:none;
}

.suggestion:hover{
background:#f5f5f5;
}

.suggestion.active{
background:#e8f0fe;
}

/* responsivo */

@media (max-width:600px){

#searchContainer{
width:90%;
}

}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">

<div id="searchIcon">🔍</div>

<input id="searchInput"
placeholder="Buscar endereço ou lugar">

</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

// mapa
var map = L.map('map').setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// geolocalização

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],13);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

}


// elementos

const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

let resultsList = [];
let selectedIndex = -1;


// debounce

function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);

timer = setTimeout(func,delay);

}

}

input.addEventListener("input", debounce(searchPlaces,300));


// teclado

input.addEventListener("keydown", function(e){

if(e.key === "ArrowDown"){

selectedIndex++;

updateSelection();

}

if(e.key === "ArrowUp"){

selectedIndex--;

updateSelection();

}

if(e.key === "Enter"){

if(selectedIndex >=0){

selectPlace(resultsList[selectedIndex]);

}

}

});


// busca

async function searchPlaces(){

let query = input.value;

if(query.length < 3){

suggestions.style.display="none";

return;

}

let bbox = map.getBounds();

let url =
`https://photon.komoot.io/api/?q=${query}&limit=6&bbox=${bbox.getWest()},${bbox.getSouth()},${bbox.getEast()},${bbox.getNorth()}`;

let res = await fetch(url);

let data = await res.json();

let results = data.features;


// fallback global

if(results.length === 0){

res = await fetch(`https://photon.komoot.io/api/?q=${query}&limit=6`);

data = await res.json();

results = data.features;

}

resultsList = results;

selectedIndex = -1;

showSuggestions(results);

}


// mostrar sugestões

function showSuggestions(results){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";

return;

}

results.forEach((place,index)=>{

let name = place.properties.name || "";

let city = place.properties.city || "";

let country = place.properties.country || "";

let label = `${name} ${city} ${country}`;

let div = document.createElement("div");

div.className="suggestion";

div.innerText=label;

div.onclick = function(){

selectPlace(place);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


// atualizar seleção teclado

function updateSelection(){

let items = document.querySelectorAll(".suggestion");

items.forEach(el=>el.classList.remove("active"));

if(selectedIndex >=0 && selectedIndex < items.length){

items[selectedIndex].classList.add("active");

}

}


// selecionar lugar

function selectPlace(place){

let lat = place.geometry.coordinates[1];

let lon = place.geometry.coordinates[0];

let name = place.properties.name || "";

let city = place.properties.city || "";

let country = place.properties.country || "";

let label = `${name} ${city} ${country}`;

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;

suggestions.style.display="none";

}

});
</script>

</body>
</html>
