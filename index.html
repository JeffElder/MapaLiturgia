<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:360px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchIcon{
margin-right:8px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:260px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
<div id="searchIcon">🔍</div>
<input id="searchInput" placeholder="Buscar endereço ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

var map = L.map('map').setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// geolocalização
if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],13);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

}


// elementos
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

let resultsList = [];


// debounce
function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);
timer=setTimeout(func,delay);

}

}

input.addEventListener("input",debounce(searchPlaces,400));


// busca
async function searchPlaces(){

let query = input.value;

if(query.length < 3){

suggestions.style.display="none";
return;

}

let bbox = map.getBounds();

let url =
`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=br&viewbox=${bbox.getWest()},${bbox.getNorth()},${bbox.getEast()},${bbox.getSouth()}&bounded=1&q=${query}`;

let res = await fetch(url);

let data = await res.json();


// fallback global
if(data.length === 0){

url =
`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=br&q=${query}`;

res = await fetch(url);

data = await res.json();

}

resultsList = data;

showSuggestions(data);

}


// mostrar sugestões
function showSuggestions(results){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach(place=>{

let label = place.display_name;

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick=function(){

selectPlace(place);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


// selecionar endereço
function selectPlace(place){

let lat = place.lat;
let lon = place.lon;

map.setView([lat,lon],17);

L.marker([lat,lon])
.addTo(map)
.bindPopup(place.display_name)
.openPopup();

input.value = place.display_name;

suggestions.style.display="none";

}

});
</script>

</body>
</html>
