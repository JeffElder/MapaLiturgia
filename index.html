<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Meu mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
margin: 0;
}
body{
margin:0;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// limites do mundo
var bounds = [
[-90, -180],
[90, 180]
];

// cria mapa com limites
var map = L.map('map', {
minZoom: 4,
maxZoom: 19,
maxBounds: bounds,
maxBoundsViscosity: 1.0
});

// camada do mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors',
noWrap: true,
minZoom: 4,
maxZoom: 19
}).addTo(map);

// geolocalização
if (navigator.geolocation) {

navigator.geolocation.getCurrentPosition(function(position) {

var lat = position.coords.latitude;
var lon = position.coords.longitude;

// centraliza mapa
map.setView([lat, lon], 13);

// marcador
L.marker([lat, lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

}, function() {

// localização padrão
map.setView([-23.5505, -46.6333], 13);

L.marker([-23.5505, -46.6333])
.addTo(map)
.bindPopup("Local padrão")
.openPopup();

});

} else {

// fallback
map.setView([-23.5505, -46.6333], 13);

}

</script>

</body>
</html>
