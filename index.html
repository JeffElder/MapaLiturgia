<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca avançada</title>

<link rel="icon" href="data:,">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:360px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:260px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔍
<input id="searchInput"
placeholder="Buscar endereço, rua, cidade ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

// mapa
var map = L.map('map').setView([-15,-55],4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// localização
map.locate({setView:true,maxZoom:16});

map.on("locationfound",function(e){

L.marker(e.latlng)
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});


// elementos
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");


// debounce
function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);
timer=setTimeout(func,delay);

}

}

input.addEventListener("input",debounce(searchPlaces,250));


// autocomplete
async function searchPlaces(){

let query = input.value;

if(query.length < 2){

suggestions.style.display="none";
return;

}

let url =
`https://photon.komoot.io/api/?q=${query}&limit=6&lang=pt`;

let res = await fetch(url);

let data = await res.json();

showSuggestions(data.features);

}


// sugestões
function showSuggestions(results){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach(place=>{

let props = place.properties;

let label =
props.name ||
props.street ||
props.city ||
props.state ||
"Local";

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick=function(){

selectPlace(place);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


// selecionar local
async function selectPlace(place){

let lat = place.geometry.coordinates[1];
let lon = place.geometry.coordinates[0];

let url =
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=pt-BR`;

let res = await fetch(url);

let data = await res.json();

let label = data.display_name;

map.setView([lat,lon],17);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;

suggestions.style.display="none";

}



////////////////////////////////////////////////////
//////////// IGREJAS CATÓLICAS OTIMIZADO ///////////
////////////////////////////////////////////////////


// camada
var churchesLayer = L.layerGroup().addTo(map);


// ícone grande de Cristo medieval
var churchIcon = L.icon({

iconUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Crucifixion_Giotto_Scrovegni.jpg/1024px-Crucifixion_Giotto_Scrovegni.jpg",

iconSize:[280,280],
iconAnchor:[140,280],
popupAnchor:[0,-260]

});


// cache
var loadedAreas = {};
var requestRunning = false;
var churchTimeout = null;


// chave de área
function getAreaKey(bounds){

var zoom = map.getZoom();

var lat = bounds.getCenter().lat.toFixed(2);
var lon = bounds.getCenter().lng.toFixed(2);

return zoom+"_"+lat+"_"+lon;

}


// carregar igrejas
function loadCatholicChurches(){

if(map.getZoom() < 13) return;

clearTimeout(churchTimeout);

churchTimeout = setTimeout(fetchChurches,1500);

}


// buscar na API
async function fetchChurches(){

if(requestRunning) return;

var bounds = map.getBounds();

var key = getAreaKey(bounds);

if(loadedAreas[key]) return;

requestRunning = true;

loadedAreas[key] = true;

var south = bounds.getSouth();
var west = bounds.getWest();
var north = bounds.getNorth();
var east = bounds.getEast();


var query = `
[out:json][timeout:25];
(
node["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
way["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
);
out center;
`;

try{

var res = await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
});

if(!res.ok){

console.warn("Overpass limitou:",res.status);
requestRunning=false;
return;

}

var data = await res.json();

data.elements.forEach(el=>{

var lat = el.lat || el.center.lat;
var lon = el.lon || el.center.lon;

var name = el.tags?.name || "Igreja Católica";

var marker = L.marker([lat,lon],{

icon:churchIcon,
riseOnHover:true

}).bindPopup(name);

churchesLayer.addLayer(marker);

});

}catch(e){

console.warn("Erro Overpass",e);

}

requestRunning=false;

}


// carregar ao mover mapa
map.on("moveend",loadCatholicChurches);


});
</script>

</body>
</html>
