<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca avançada</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

/* barra de busca */

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:9999;
width:320px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
padding:8px;
}

#searchIcon{
margin-right:6px;
font-size:16px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:0 0 8px 8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
max-height:220px;
overflow-y:auto;
}

.suggestion{
padding:8px;
cursor:pointer;
}

.suggestion:hover,
.suggestion.active{
background:#f0f0f0;
}

@media (max-width:600px){

#searchContainer{
width:90%;
}

}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
<div id="searchIcon">🔍</div>
<input id="searchInput" placeholder="Buscar endereço ou lugar">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

// mapa
var map = L.map('map').setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// geolocalização
if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],13);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

}


// elementos
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

let currentSelection = -1;
let resultsList = [];


// debounce
function debounce(func,delay){
let timeout;
return function(){
clearTimeout(timeout);
timeout = setTimeout(func,delay);
}
}

input.addEventListener("input", debounce(searchPlaces,300));


// teclado
input.addEventListener("keydown", function(e){

if(e.key === "ArrowDown"){
currentSelection++;
updateSelection();
}

if(e.key === "ArrowUp"){
currentSelection--;
updateSelection();
}

if(e.key === "Enter"){
if(currentSelection >=0){
selectPlace(resultsList[currentSelection]);
}
}

});


// busca
async function searchPlaces(){

let query = input.value;

if(query.length < 3){
suggestions.innerHTML="";
return;
}

let bbox = map.getBounds();

let urlLocal =
`https://photon.komoot.io/api/?q=${query}&limit=6&bbox=${bbox.getWest()},${bbox.getSouth()},${bbox.getEast()},${bbox.getNorth()}&lang=pt`;

let response = await fetch(urlLocal);
let data = await response.json();

let results = data.features;


// fallback global
if(results.length === 0){

let urlGlobal =
`https://photon.komoot.io/api/?q=${query}&limit=6&lang=pt`;

response = await fetch(urlGlobal);
data = await response.json();

results = data.features;

}

resultsList = results;
currentSelection = -1;

showSuggestions(results);

}


// mostrar sugestões
function showSuggestions(results){

suggestions.innerHTML="";

results.forEach((place,index)=>{

let name = place.properties.name || "";
let city = place.properties.city || "";
let country = place.properties.country || "";

let label = `${name} ${city} ${country}`;

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick = function(){
selectPlace(place);
};

suggestions.appendChild(div);

});

}


// atualizar seleção teclado
function updateSelection(){

let items = document.querySelectorAll(".suggestion");

items.forEach(el => el.classList.remove("active"));

if(currentSelection >=0 && currentSelection < items.length){

items[currentSelection].classList.add("active");

}

}


// selecionar lugar
function selectPlace(place){

let lat = place.geometry.coordinates[1];
let lon = place.geometry.coordinates[0];

let name = place.properties.name || "";
let city = place.properties.city || "";
let country = place.properties.country || "";

let label = `${name} ${city} ${country}`;

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;
suggestions.innerHTML="";

}

});
</script>

</body>
</html>
