<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Meu mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
margin: 0;
}
body{
margin:0;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// cria o mapa com limite de zoom
var map = L.map('map', {
minZoom: 4,
maxZoom: 19
});

// adiciona o mapa base
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors',
noWrap: true,
minZoom: 4,
maxZoom: 19
}).addTo(map);

// verifica geolocalização
if (navigator.geolocation) {

navigator.geolocation.getCurrentPosition(function(position) {

var lat = position.coords.latitude;
var lon = position.coords.longitude;

// centraliza mapa na localização do usuário
map.setView([lat, lon], 13);

// adiciona marcador
L.marker([lat, lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

}, function() {

// caso não permita localização
map.setView([-23.5505, -46.6333], 13);

L.marker([-23.5505, -46.6333])
.addTo(map)
.bindPopup("Local padrão")
.openPopup();

});

} else {

// navegador não suporta geolocalização
map.setView([-23.5505, -46.6333], 13);

}

</script>

</body>
</html>
