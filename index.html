<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com localização</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:360px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:260px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔍
<input id="searchInput" placeholder="Buscar cidade, rua ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

// mapa inicial
var map = L.map('map').setView([-15,-55],4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// tentar pegar localização
requestLocation();

function requestLocation(){

if(!navigator.geolocation){

console.log("Geolocalização não suportada");

return;

}

navigator.geolocation.getCurrentPosition(

function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

},

function(err){

console.log("Erro localização:",err.message);

// fallback Brasil
map.setView([-15,-55],4);

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}


// busca (simplificada)
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);
timer=setTimeout(func,delay);

}

}

input.addEventListener("input",debounce(searchPlaces,300));


async function searchPlaces(){

let query = input.value;

if(query.length < 2){

suggestions.style.display="none";
return;

}

let url =
`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=br&accept-language=pt-BR&q=${query}`;

let res = await fetch(url);

let data = await res.json();

showSuggestions(data);

}


function showSuggestions(results){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach(place=>{

let label = place.display_name;

let div = document.createElement("div");

div.className="suggestion";
div.innerText=label;

div.onclick=function(){

let lat = place.lat;
let lon = place.lon;

map.setView([lat,lon],17);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

suggestions.style.display="none";

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}

});
</script>

</body>
</html>
