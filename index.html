<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa Global de Igrejas</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:380px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:15px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:300px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f0f0f0;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔎
<input id="searchInput" placeholder="Buscar rua, cidade ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

////////////////////////////////////////////////////
// SALVAR IGREJA (SEM CORS - USANDO GET)
////////////////////////////////////////////////////

window.saveChurch = async function(name, lat, lon, btn){

if(!name){
alert("Digite o nome da igreja");
return;
}

btn.disabled=true;
btn.innerText="Salvando...";

try{

const base = "https://script.google.com/macros/s/AKfycbzA7ozFy0lFhHPZuus-ZGBzQ7NmzjG4wvpLPnGuq97TWHOs7S2dLxOlBhLAW4yYe6O8/exec";
const url =
base +
"?name=" + encodeURIComponent(name) +
"&lat=" + encodeURIComponent(lat) +
"&lon=" + encodeURIComponent(lon);

await fetch(url);

alert("Igreja salva com sucesso!");

btn.innerText="Salvo!";

}catch(err){

console.error(err);

alert("Erro ao salvar igreja");

btn.disabled=false;
btn.innerText="Salvar Igreja";

}

}

////////////////////////////////////////////////////
// INICIAR MAPA
////////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded",function(){

var map = L.map('map').setView([0,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}).addTo(map);

////////////////////////////////////////////////////
// ICONES
////////////////////////////////////////////////////

var personIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/15942/15942135.png",
iconSize:[35,35],
iconAnchor:[17,35],
popupAnchor:[0,-30]
});

var crossIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/443/443572.png",
iconSize:[32,32],
iconAnchor:[16,32],
popupAnchor:[0,-28]
});

////////////////////////////////////////////////////
// LOCALIZAÇÃO
////////////////////////////////////////////////////

map.locate({setView:true,maxZoom:16});

map.on("locationfound",function(e){

L.marker(e.latlng,{icon:personIcon})
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

////////////////////////////////////////////////////
// DUPLO CLIQUE PARA ADICIONAR IGREJA
////////////////////////////////////////////////////

map.on("dblclick",function(e){

let lat = e.latlng.lat;
let lon = e.latlng.lng;

let marker = L.marker([lat,lon],{
icon:crossIcon,
draggable:true
}).addTo(map);

let popup = document.createElement("div");

popup.innerHTML = `
<b>Adicionar Igreja</b><br><br>
<input placeholder="Nome da igreja"><br><br>
Latitude: ${lat.toFixed(6)}<br>
Longitude: ${lon.toFixed(6)}<br><br>
<button>Salvar Igreja</button>
`;

let input = popup.querySelector("input");
let button = popup.querySelector("button");

button.onclick = function(){
saveChurch(input.value,lat,lon,button);
}

marker.bindPopup(popup).openPopup();

});

////////////////////////////////////////////////////
// BUSCA GLOBAL
////////////////////////////////////////////////////

const input=document.getElementById("searchInput");
const suggestions=document.getElementById("suggestions");

let resultsData=[];

function debounce(func,delay){
let timer;
return function(...args){
clearTimeout(timer);
timer=setTimeout(()=>{func.apply(this,args)},delay);
}
}

input.addEventListener("input",debounce(searchPlaces,350));

async function searchPlaces(){

let query=input.value.trim();

if(query.length<3){
suggestions.style.display="none";
return;
}

let url=`https://nominatim.openstreetmap.org/search?format=json&limit=8&q=${encodeURIComponent(query)}`;

let res=await fetch(url);

let data=await res.json();

resultsData=data;

showSuggestions(data);

}

function showSuggestions(results){

suggestions.innerHTML="";

results.forEach((place,i)=>{

let div=document.createElement("div");

div.className="suggestion";

div.innerText=place.display_name;

div.onclick=function(){selectPlace(i);};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}

function selectPlace(index){

let place=resultsData[index];

let lat=parseFloat(place.lat);
let lon=parseFloat(place.lon);

map.setView([lat,lon],17);

let marker = L.marker([lat,lon],{
icon:crossIcon,
draggable:true
}).addTo(map);

let popup = document.createElement("div");

popup.innerHTML=`
<b>${place.display_name}</b><br><br>
<input placeholder="Nome da igreja"><br><br>
<button>Salvar Igreja</button>
`;

let input = popup.querySelector("input");
let button = popup.querySelector("button");

button.onclick=function(){
saveChurch(input.value,lat,lon,button);
}

marker.bindPopup(popup).openPopup();

suggestions.style.display="none";

input.value=place.display_name;

}

////////////////////////////////////////////////////
// CARREGAR IGREJAS EXISTENTES
////////////////////////////////////////////////////

fetch("exportchurches.geojson")

.then(res=>res.json())

.then(data=>{

L.geoJSON(data,{

pointToLayer:function(feature,latlng){
return L.marker(latlng,{icon:crossIcon});
},

onEachFeature:function(feature,layer){

let nome = feature.properties.name || "Igreja";

layer.bindPopup(nome);

}

}).addTo(map);

})

.catch(err=>console.log("Erro ao carregar igrejas:",err));

});

</script>

</body>
</html>
