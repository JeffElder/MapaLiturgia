<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca avançada</title>

<link rel="icon" href="data:,">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:380px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:15px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:300px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover,
.suggestion.active{
background:#f0f0f0;
}

/* Ícone das igrejas */

.church-icon{
transition:transform 0.2s ease;
}

.church-icon:hover{
transform:scale(1.6);
z-index:1000;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔎
<input id="searchInput" placeholder="Buscar rua, cidade ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

////////////////////////////////////////////////////
//////////////////// MAPA //////////////////////////
////////////////////////////////////////////////////

var map = L.map('map').setView([-15,-55],4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}).addTo(map);


////////////////////////////////////////////////////
//////////////// LOCALIZAÇÃO ///////////////////////
////////////////////////////////////////////////////

map.locate({setView:true,maxZoom:16});

map.on("locationfound",function(e){

L.marker(e.latlng)
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});


////////////////////////////////////////////////////
//////////////////// BUSCA /////////////////////////
////////////////////////////////////////////////////

const input=document.getElementById("searchInput");
const suggestions=document.getElementById("suggestions");

let resultsData=[];
let selectedIndex=-1;

function debounce(func,delay){

let timer;

return function(...args){

clearTimeout(timer);

timer=setTimeout(()=>{
func.apply(this,args)
},delay);

}

}

input.addEventListener("input",debounce(searchPlaces,350));

async function searchPlaces(){

let query=input.value.trim();

if(query.length<3){

suggestions.style.display="none";
return;

}

try{

let url=`https://nominatim.openstreetmap.org/search?format=json&limit=8&addressdetails=1&countrycodes=br&q=${encodeURIComponent(query)}`;

let res=await fetch(url,{
headers:{ "Accept":"application/json" }
});

if(!res.ok) throw new Error("Erro Nominatim");

let data=await res.json();

resultsData=data;

showSuggestions(data);

}catch(err){

console.log("Erro busca:",err);

}

}


function showSuggestions(results){

suggestions.innerHTML="";
selectedIndex=-1;

if(!results.length){

suggestions.style.display="none";
return;

}

results.forEach((place,i)=>{

let div=document.createElement("div");

div.className="suggestion";

div.innerText=place.display_name;

div.onclick=function(){

selectPlace(i);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


function selectPlace(index){

let place=resultsData[index];

let lat=place.lat;
let lon=place.lon;

map.setView([lat,lon],17);

L.marker([lat,lon])
.addTo(map)
.bindPopup(place.display_name)
.openPopup();

input.value=place.display_name;

suggestions.style.display="none";

}


input.addEventListener("keydown",function(e){

let items=document.querySelectorAll(".suggestion");

if(!items.length) return;

if(e.key==="ArrowDown"){

selectedIndex++;

if(selectedIndex>=items.length) selectedIndex=0;

}

else if(e.key==="ArrowUp"){

selectedIndex--;

if(selectedIndex<0) selectedIndex=items.length-1;

}

else if(e.key==="Enter"){

if(selectedIndex>=0){

selectPlace(selectedIndex);

}

return;

}

items.forEach(el=>el.classList.remove("active"));

if(selectedIndex>=0){

items[selectedIndex].classList.add("active");

}

});


document.addEventListener("click",function(e){

if(!document.getElementById("searchContainer").contains(e.target)){

suggestions.style.display="none";

}

});


////////////////////////////////////////////////////
//////////// IGREJAS CATÓLICAS /////////////////////
////////////////////////////////////////////////////

var churchesLayer=L.layerGroup().addTo(map);

/* Ícone Crucifixo de São Damião */

var churchIcon=L.icon({

iconUrl:"https://upload.wikimedia.org/wikipedia/commons/7/7b/San_Damiano_Cross.png",
iconSize:[36,36],
iconAnchor:[18,36],
className:"church-icon"

});


async function loadCatholicChurches(){

try{

churchesLayer.clearLayers();

var bounds=map.getBounds();

var south=bounds.getSouth();
var west=bounds.getWest();
var north=bounds.getNorth();
var east=bounds.getEast();

var query=`
[out:json][timeout:25];
(
node["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
way["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](${south},${west},${north},${east});
);
out center;
`;

var res=await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
});

if(!res.ok){

console.log("Overpass limitou requisição");
return;

}

var data=await res.json();

data.elements.forEach(el=>{

var lat=el.lat || el.center?.lat;
var lon=el.lon || el.center?.lon;

if(!lat || !lon) return;

var name=el.tags?.name || "Igreja Católica";

L.marker([lat,lon],{icon:churchIcon})
.addTo(churchesLayer)
.bindPopup(name);

});

}catch(err){

console.log("Erro Overpass:",err);

}

}


const loadChurchesDebounced=debounce(loadCatholicChurches,2000);

map.whenReady(loadChurchesDebounced);

map.on("moveend",loadChurchesDebounced);


});

</script>

</body>
</html>
