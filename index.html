<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:340px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:8px 14px;
}

#searchIcon{
font-size:18px;
margin-right:8px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:240px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px 14px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:last-child{
border-bottom:none;
}

.suggestion:hover{
background:#f2f2f2;
}

.suggestion.active{
background:#e8f0fe;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
<div id="searchIcon">🔍</div>
<input id="searchInput" placeholder="Buscar endereço ou lugar">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

// mapa
var map = L.map('map').setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// localização
if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],13);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

}


// elementos
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

let resultsList = [];
let selectedIndex = -1;


// debounce
function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);

timer = setTimeout(func,delay);

}

}

input.addEventListener("input", debounce(searchPlaces,300));


// teclado
input.addEventListener("keydown", function(e){

if(e.key === "ArrowDown"){

selectedIndex++;
updateSelection();

}

if(e.key === "ArrowUp"){

selectedIndex--;
updateSelection();

}

if(e.key === "Enter"){

if(selectedIndex >=0){

selectPlace(resultsList[selectedIndex]);

}

}

});


// busca
async function searchPlaces(){

let query = input.value;

if(query.length < 2){

suggestions.style.display="none";
return;

}

let bbox = map.getBounds();

let urlLocal =
`https://photon.komoot.io/api/?q=${query}&limit=6&lang=pt&bbox=${bbox.getWest()},${bbox.getSouth()},${bbox.getEast()},${bbox.getNorth()}`;

let res = await fetch(urlLocal);
let data = await res.json();

let results = data.features;


// fallback global
if(results.length === 0){

let urlGlobal =
`https://photon.komoot.io/api/?q=${query}&limit=6&lang=pt`;

res = await fetch(urlGlobal);
data = await res.json();

results = data.features;

}

resultsList = results;
selectedIndex = -1;

showSuggestions(results);

}


// montar label em português
function formatLabel(place){

let props = place.properties;

let parts = [];

if(props.name) parts.push(props.name);

if(props.street) parts.push(props.street);

if(props.housenumber) parts.push(props.housenumber);

if(props.city) parts.push(props.city);

if(props.state) parts.push(props.state);

if(props.country) parts.push(props.country);

return parts.join(", ");

}


// mostrar sugestões
function showSuggestions(results){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach((place,index)=>{

let label = formatLabel(place);

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick = function(){

selectPlace(place);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


// teclado seleção
function updateSelection(){

let items = document.querySelectorAll(".suggestion");

items.forEach(el=>el.classList.remove("active"));

if(selectedIndex >=0 && selectedIndex < items.length){

items[selectedIndex].classList.add("active");

}

}


// selecionar lugar
function selectPlace(place){

let lat = place.geometry.coordinates[1];
let lon = place.geometry.coordinates[0];

let label = formatLabel(place);

map.setView([lat,lon],16);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;

suggestions.style.display="none";

}

});
</script>

</body>
</html>
