<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa Global de Igrejas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

/* tooltip compacto */

.leaflet-tooltip.churchTooltip{
max-width:220px;
white-space:normal;
word-wrap:break-word;
line-height:1.3;
font-size:13px;
padding:6px 8px;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

var map=L.map('map').setView([-25.4376,-49.2736],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}).addTo(map);

////////////////////////////////////////////////////
// ICONES
////////////////////////////////////////////////////

var crossIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/443/443572.png",
iconSize:[32,32],
iconAnchor:[16,32]
});

var crossIconHover=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/443/443572.png",
iconSize:[50,50],
iconAnchor:[25,50]
});

////////////////////////////////////////////////////
// FUNÇÃO PARA PEGAR ENDEREÇO
////////////////////////////////////////////////////

async function getAddress(lat,lon){

try{

let url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

let res=await fetch(url);
let data=await res.json();

let addr=data.address;

let rua=addr.road || "";
let numero=addr.house_number || "";
let cidade=addr.city || addr.town || addr.village || "";
let estado=addr.state || "";

return `${rua} ${numero}<br>${cidade} - ${estado}`;

}catch(e){

return "";

}

}

////////////////////////////////////////////////////
// CARREGAR GEOJSON
////////////////////////////////////////////////////

fetch("exportchurches.geojson")

.then(res=>res.json())

.then(data=>{

L.geoJSON(data,{

pointToLayer:function(feature,latlng){
return L.marker(latlng,{icon:crossIcon});
},

onEachFeature:function(feature,layer){

// AGORA USA O CAMPO CORRETO
let nome=feature.properties.nome || "Igreja";

let tooltip=L.tooltip({
direction:"top",
offset:[0,-20],
opacity:0.95,
className:"churchTooltip"
}).setContent("<b>"+nome+"</b>");

layer.bindTooltip(tooltip);

layer.on("mouseover",async function(){

layer.setIcon(crossIconHover);
layer.openTooltip();

let lat=layer.getLatLng().lat;
let lon=layer.getLatLng().lng;

let endereco=await getAddress(lat,lon);

tooltip.setContent(
"<b>"+nome+"</b><br>"+endereco
);

});

layer.on("mouseout",function(){

layer.setIcon(crossIcon);
layer.closeTooltip();

});

}

}).addTo(map);

})

.catch(err=>console.log("Erro ao carregar igrejas:",err));

});

</script>

</body>
</html>
