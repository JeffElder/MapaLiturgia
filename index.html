<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca inteligente</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

#searchContainer{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:10000;
width:360px;
}

#searchBox{
display:flex;
align-items:center;
background:white;
border-radius:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
padding:10px;
}

#searchInput{
border:none;
outline:none;
width:100%;
font-size:14px;
}

#suggestions{
background:white;
border-radius:10px;
margin-top:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
max-height:260px;
overflow-y:auto;
display:none;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div id="searchContainer">

<div id="searchBox">
🔍
<input id="searchInput" placeholder="Buscar cidade, rua ou CEP">
</div>

<div id="suggestions"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

var map = L.map('map').setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");


// detectar tipo de busca
function detectType(query){

if(/^\d{5}-?\d{3}$/.test(query)) return "cep";

if(/rua|avenida|av|travessa|alameda|estrada/i.test(query))
return "rua";

return "cidade";

}


// debounce
function debounce(func,delay){

let timer;

return function(){

clearTimeout(timer);
timer=setTimeout(func,delay);

}

}

input.addEventListener("input",debounce(searchPlaces,300));


// busca
async function searchPlaces(){

let query = input.value;

if(query.length < 2){

suggestions.style.display="none";
return;

}

let type = detectType(query);

let url =
`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=8&countrycodes=br&accept-language=pt-BR&q=${query}`;

let res = await fetch(url);
let data = await res.json();

let filtered = [];

data.forEach(place=>{

let addr = place.address || {};

if(type === "cidade"){

if(addr.city || addr.town || addr.village){

filtered.push(place);

}

}

if(type === "rua"){

if(addr.road){

filtered.push(place);

}

}

if(type === "cep"){

if(addr.postcode){

filtered.push(place);

}

}

});

showSuggestions(filtered,type);

}


// montar label
function buildLabel(place,type){

let addr = place.address || {};

if(type === "cidade"){

return addr.city || addr.town || addr.village;

}

if(type === "rua"){

return addr.road;

}

if(type === "cep"){

return `${addr.postcode} - ${addr.road || ""} ${addr.city || ""}`;

}

}


// mostrar sugestões
function showSuggestions(results,type){

suggestions.innerHTML="";

if(results.length === 0){

suggestions.style.display="none";
return;

}

results.forEach(place=>{

let label = buildLabel(place,type);

if(!label) return;

let div = document.createElement("div");

div.className="suggestion";
div.innerText = label;

div.onclick=function(){

selectPlace(place,label);

};

suggestions.appendChild(div);

});

suggestions.style.display="block";

}


// selecionar
function selectPlace(place,label){

let lat = place.lat;
let lon = place.lon;

map.setView([lat,lon],16);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

input.value = label;

suggestions.style.display="none";

}

});
</script>

</body>
</html>
