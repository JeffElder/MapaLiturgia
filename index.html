<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa com busca</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>

html, body{
height:100%;
margin:0;
}

#map{
height:100%;
width:100%;
}

/* barra de busca */
#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:9999;
background:white;
padding:8px;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
width:280px;
}

#searchInput{
width:100%;
padding:6px;
}

#suggestions{
background:white;
max-height:200px;
overflow-y:auto;
border-top:1px solid #ccc;
}

.suggestion{
padding:6px;
cursor:pointer;
}

.suggestion:hover{
background:#eee;
}

</style>
</head>

<body>

<!-- barra de busca -->
<div id="searchBox">
<input id="searchInput" placeholder="Buscar endereço...">
<div id="suggestions"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// criar mapa
var map = L.map('map').setView([-23.5505,-46.6333],13);

// tiles
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);


// elementos da busca
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", searchPlaces);


// busca simples
async function searchPlaces(){

let query = input.value;

if(query.length < 3){
suggestions.innerHTML="";
return;
}

let url =
`https://photon.komoot.io/api/?q=${query}&limit=5`;

let response = await fetch(url);
let data = await response.json();

showSuggestions(data.features);

}


// mostrar resultados
function showSuggestions(results){

suggestions.innerHTML="";

results.forEach(place=>{

let name = place.properties.name || "";
let city = place.properties.city || "";
let country = place.properties.country || "";

let label = `${name} ${city} ${country}`;

let div = document.createElement("div");

div.className="suggestion";
div.innerText=label;

div.onclick=function(){

let lat = place.geometry.coordinates[1];
let lon = place.geometry.coordinates[0];

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup(label)
.openPopup();

suggestions.innerHTML="";
input.value=label;

};

suggestions.appendChild(div);

});

}

</script>

</body>
</html>
