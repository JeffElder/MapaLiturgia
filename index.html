<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Meu mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
height: 100%;
margin: 0;
}

#map {
height: 100%;
width: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// limites reais do sistema Web Mercator
const southWest = L.latLng(-85.05112878, -180);
const northEast = L.latLng(85.05112878, 180);
const bounds = L.latLngBounds(southWest, northEast);

// criação do mapa
var map = L.map('map', {
minZoom: 4,
maxZoom: 19,
maxBounds: bounds,
maxBoundsViscosity: 1.0,
worldCopyJump: false
});

// camada base
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors',
noWrap: true,
minZoom: 4,
maxZoom: 19
}).addTo(map);


// geolocalização
if (navigator.geolocation) {

navigator.geolocation.getCurrentPosition(function(position) {

const lat = position.coords.latitude;
const lon = position.coords.longitude;

map.setView([lat, lon], 13);

L.marker([lat, lon])
.addTo(map)
.bindPopup("Você está aqui")
.openPopup();

}, function() {

abrirPadrao();

});

} else {

abrirPadrao();

}


// fallback caso não consiga localização
function abrirPadrao(){

const lat = -23.5505;
const lon = -46.6333;

map.setView([lat, lon], 13);

L.marker([lat, lon])
.addTo(map)
.bindPopup("Local padrão")
.openPopup();

}

</script>

</body>
</html>
